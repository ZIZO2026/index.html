<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Yazan AAA Game</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}
#ui{position:absolute;top:15px;left:15px;z-index:10;width:320px}
button{margin:5px;padding:10px;background:orange;border:none;border-radius:8px;cursor:pointer}
#txt{margin-top:10px;background:rgba(0,0,0,0.6);padding:10px;border-radius:10px;font-size:13px;white-space:pre-wrap}
canvas{display:block}
</style>
</head>

<body>

<div id="ui">
<button onclick="start()">Start</button>
<button onclick="next()">Next</button>
<div id="txt">Yazan AAA Cinematic World</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshStandardMaterial({color:0x003300})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// PORTAL
const portal = new THREE.Mesh(
new THREE.TorusGeometry(1.3,0.3,16,100),
new THREE.MeshBasicMaterial({color:0xaa00ff})
);
portal.position.y = 2;
scene.add(portal);

// DINOSAUR
const dino = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0x00ff00})
);
dino.position.set(4,1,0);
scene.add(dino);

// THRONE
const throne = new THREE.Mesh(
new THREE.BoxGeometry(2,1,2),
new THREE.MeshStandardMaterial({color:0x111111})
);
throne.position.set(0,0,0);
throne.visible=false;
scene.add(throne);

// DARK YAZAN
const darkYazan = new THREE.Mesh(
new THREE.SphereGeometry(0.8,32,32),
new THREE.MeshStandardMaterial({color:0x000000})
);
darkYazan.position.set(0,1.5,0);
darkYazan.visible=false;
scene.add(darkYazan);

// DRAGON
let dragon;
const loader = new THREE.GLTFLoader();

loader.load(
"https://cdn.jsdelivr.net/gh/mrdoob/three.js@r150/examples/models/gltf/Dragon.glb",
(gltf)=>{
dragon = gltf.scene;
dragon.scale.set(0.01,0.01,0.01);
dragon.position.set(-3,1,0);
scene.add(dragon);
}
);

// STORY
const story = [
"Il était une fois Yazan, un garçon noble dans son village.",
"Un portail violet apparaît et l’attire dans un monde ancien.",
"Tyrannosaures, dragons et créatures légendaires apparaissent.",
"La sirène avertit Yazan : le monde doit rester caché.",
"Yazan accepte le pouvoir du dragon de feu.",
"Il devient de plus en plus sombre...",
"Il combat ses anciens alliés dans une guerre éternelle.",
"Le monde tombe dans le chaos.",
"Yazan devient un dragon noir et conquiert tout."
];

let i=0;

// AUDIO
function speak(t){
let s=new SpeechSynthesisUtterance(t);
s.lang="fr-FR";
speechSynthesis.speak(s);
}

// START
function start(){
i=0;
document.getElementById("txt").innerText=story[0];
speak(story[0]);
}

// NEXT
function next(){
i++;

if(i>=story.length){

scene.background=new THREE.Color(0x000000);
portal.visible=false;
dino.visible=false;
if(dragon) dragon.visible=false;

throne.visible=true;
darkYazan.visible=true;

camera.position.set(0,2,6);

document.getElementById("txt").innerText=
"FIN: Yazan règne comme le dragon noir sur le trône...";

speak("Final sombre de Yazan");
return;
}

document.getElementById("txt").innerText=story[i];
speak(story[i]);

if(i==2) scene.background=new THREE.Color(0x220022);
if(i==4 && dragon) dragon.traverse(o=>{if(o.material)o.material.color.set(0xff3300)});
if(i==6) dino.material.color.set(0xff0000);
if(i==8){
darkYazan.visible=true;
darkYazan.material.color.set(0x000000);
}

}

// ANIMATION
function animate(){
requestAnimationFrame(animate);

portal.rotation.y += 0.01;
dino.rotation.y += 0.01;

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
